[platformio]
default_envs = jc1060

[env:jc1060]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.37
framework = arduino
board = esp32-p4-evboard
board_build.psram = enabled
board_build.partitions = partitions.csv
monitor_speed = 115200
lib_deps =
    lvgl/lvgl@^9.2.2
    bblanchon/ArduinoJson@^7.0.0
build_flags =
    -O3
    -DLV_CONF_INCLUDE_SIMPLE
    -I .
    -I src
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_ETHERNET
src_filter =
    +<*>
    -<main_s3.cpp>
    -<main_cyd.cpp>
    -<ui_s3/>
    -<waveshare/>

[env:waveshare]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.37
framework = arduino
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.psram = enabled
board_build.partitions = partitions_s3.csv
board_upload.flash_size = 16MB
monitor_speed = 115200
lib_deps =
    lvgl/lvgl@^9.2.2
    bblanchon/ArduinoJson@^7.0.0
build_flags =
    -O2
    -DLV_CONF_INCLUDE_SIMPLE
    -I .
    -I src
    -I src/waveshare
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_WIFI
    -DCONFIG_LCD_HRES=1024
    -DCONFIG_LCD_VRES=600
src_filter =
    +<*>
    -<main.cpp>
    -<main_s3.cpp>
    -<main_cyd.cpp>
    -<ui_s3/>
    -<hal/jd9165_lcd.cpp>
    -<hal/esp_lcd_jd9165.c>

[env:esp32s3_35]
platform = espressif32
framework = arduino
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.psram = enabled
board_build.partitions = partitions_s3.csv
board_upload.flash_size = 16MB
monitor_speed = 115200
lib_deps =
    lvgl/lvgl@^9.2.2
    bblanchon/ArduinoJson@^7.0.0
    bodmer/TFT_eSPI@^2.5.43
build_flags =
    -O2
    -DLV_CONF_INCLUDE_SIMPLE
    -I .
    -I src
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; TFT_eSPI config — point to our custom setup file
    -DUSER_SETUP_LOADED
    -include src/tft_setup.h
    ; S3 has no ethernet
    -DUSE_WIFI
src_filter =
    +<*>
    -<hal/>
    +<hal/lv_mem_psram.c>
    -<main.cpp>
    -<ui/map_view.cpp>
    -<ui/radar_view.cpp>
    -<ui/arrivals_view.cpp>
    -<ui/stats_view.cpp>
    -<ui/detail_card.cpp>
    -<ui/status_bar.cpp>
    -<ui/settings.cpp>
    -<ui/views.cpp>
    -<ui/alerts.cpp>
    -<ui/tile_cache.cpp>
    +<ui_s3/>

[env:cyd]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
build_flags =
    -DUSER_SETUP_LOADED
    -DUSE_HSPI_PORT
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DTOUCH_CS=33
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1
src_filter =
    -<*>
    +<main_cyd.cpp>
